repositories {
  ivy {
    url "../cnf/local"
    metadataSources {
      ivyDescriptor()
      artifact()
    }
  }
}

dependencies {
  //implementation "com.ibm.wsspi.org.osgi:org.osgi.core:.+"
  implementation 'dev:com.ibm.ws.org.apache.yoko.osgi.1.5:1.+'
}

task copyOverridesIntoAutoFVT(type: Copy) {
    mustRunAfter autoFVT
    from project.file('override/autoFVT/src/ant')
    into new File(autoFvtDir,"src/ant")
    include '*.xml'
}

zipAutoFVT.dependsOn copyOverridesIntoAutoFVT
